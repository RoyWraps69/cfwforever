# Chicago Fleet Wraps - Netlify Configuration
# Deploy trigger: 1774529451

[build]
  publish = "public"
  command = "node scripts/generate-static-pages.mjs && node scripts/stamp-header-footer.mjs"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ── Form email notifications ───────────────────────────────────────────────────
[[form]]
  name = "estimate-request"

  [[form.notification]]
    type = "email"
    subject = "New Estimate Request — Chicago Fleet Wraps"
    recipients = ["roy@chicagofleetwraps.com", "karigan@chicagofleetwraps.com"]

[[form]]
  name = "contact"

  [[form.notification]]
    type = "email"
    subject = "New Contact Form — Chicago Fleet Wraps"
    recipients = ["roy@chicagofleetwraps.com", "karigan@chicagofleetwraps.com"]

[[form]]
  name = "bay-rental"

  [[form.notification]]
    type = "email"
    subject = "New Bay Rental Request — Chicago Fleet Wraps"
    recipients = ["roy@chicagofleetwraps.com", "karigan@chicagofleetwraps.com"]

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
