<style>
@font-face{font-family:'Barlow';font-style:normal;font-weight:700;font-display:swap;src:url('/fonts/barlow-700.woff2') format('woff2')}
@font-face{font-family:'Barlow Condensed';font-style:normal;font-weight:700;font-display:swap;src:url('/fonts/barlow-condensed-700.woff2') format('woff2')}

<style>
/* Ensure all Google Fonts use swap to prevent invisible text and CLS */
@font-face { font-display: swap; }
/* Reserve space for header elements to prevent font-load CLS */
.hright { min-height: 40px; }
.hbar { min-height: 64px; }
/* Reserve space for stats section to prevent counter-animation CLS */
.cv { min-width: 4ch; display: inline-block; }
</style>
<style>
/* Critical above-the-fold CSS */
:root{--gold:#F5C518;--gold-dark:#d4a800;--gold-glow:rgba(245,197,24,.18);--black:#0A0A0A;--surface:#16181A;--dark:#1C1C1C;--steel:#242424;--card-bg:#1a1c1e;--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.55);--subtle:rgba(255,255,255,.35);--border:rgba(255,255,255,.10);--border-hover:rgba(255,255,255,.22);--border-gold:rgba(245,197,24,.25);--H:'Barlow Condensed','Barlow Condensed Fallback',sans-serif;--B:'Inter','Barlow','Barlow Fallback',sans-serif;--D:'Bebas Neue','Barlow Condensed',sans-serif;--radius:12px;--radius-lg:20px;--radius-xl:28px;--shadow-sm:0 2px 8px rgba(0,0,0,.35);--shadow-md:0 4px 20px rgba(0,0,0,.45);--shadow-lg:0 8px 40px rgba(0,0,0,.6);--shadow-gold:0 4px 24px rgba(245,197,24,.25)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--text);font-family:var(--B);font-size:16px;line-height:1.6;overflow-x:hidden}
.trib{background:#111;border-bottom:1px solid var(--border);padding:7px 0;overflow:hidden;white-space:nowrap}
.trib-inner{display:inline-flex;gap:40px;animation:ticker 35s linear infinite}
.trib-inner span{font-size:.74rem;color:rgba(255,255,255,.72);font-family:var(--H);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.trib-inner span strong{color:var(--gold)}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
header{position:sticky;top:0;z-index:1000;background:rgba(10,10,10,.97);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);overflow:visible}
.hbar{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:62px;overflow:visible}
.logo{font-family:var(--H);font-size:1.25rem;font-weight:900;color:#fff;cursor:pointer;flex-shrink:0;letter-spacing:.02em}
.logo span{color:var(--gold)}
nav{display:flex;align-items:center;gap:4px;margin-left:10px}
.hero{position:relative;height:88vh;min-height:560px;display:flex;align-items:center;overflow:hidden}
.hslides,.hsl{position:absolute;inset:0}
.hsl{background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s}
.hsl.active{opacity:1}
.ho{position:relative;z-index:2;background:linear-gradient(to right,rgba(0,0,0,.62) 25%,transparent 55%);width:100%;padding:0 5%}
.hc{max-width:680px}
.hc h1{font-family:var(--H);font-size:clamp(3rem,6vw,5rem);font-weight:900;line-height:1.05;margin:10px 0 16px;color:#fff}
.hc h1 em{color:var(--gold);font-style:normal}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:var(--H);font-size:.95rem;font-weight:800;cursor:pointer;text-decoration:none;border:2px solid transparent;transition:.18s;letter-spacing:.02em}
.btn.bg{background:var(--gold);color:#000;border-color:var(--gold)}
.pulse{animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{transform:scale(1);will-change:transform,opacity;opacity:1}60%{transform:scale(1.05);opacity:.75}}
/* Critical: header anti-FOUC — mirrors site.css header rules */
.ni{position:relative}
.ni>button{background:none;will-change:transform,opacity;border:none;color:rgba(255,255,255,.7);font-family:var(--B);font-size:.84rem;padding:8px 12px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:4px}
.drop{display:none;position:absolute;top:100%;left:0;background:#181818;border:1px solid var(--border);border-radius:10px;padding:6px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:200}
.drop::before{content:'';position:absolute;top:-10px;left:0;right:0;height:10px}
.ni:hover .drop,.ni:focus-within .drop{display:block}
.drop a{display:block;padding:8px 12px;color:rgba(255,255,255,.7);font-size:.82rem;border-radius:6px;cursor:pointer;text-decoration:none}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.hphone{color:var(--gold);font-family:var(--H);font-weight:800;font-size:.95rem;text-decoration:none;letter-spacing:.12em}
.gmb-header{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);border-radius:20px;text-decoration:none;cursor:pointer}
.gmb-header span{font-size:.74rem;font-weight:700;color:var(--gold);font-family:var(--H);letter-spacing:.04em}
.gmb-header small{font-size:.68rem;color:rgba(255,255,255,.7);display:block;line-height:1}
.gmb-header .gs{color:var(--gold);font-size:.8rem}
.hsm{display:flex;align-items:center;gap:8px}
.hsm a{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);text-decoration:none}
.mnav{display:none}
.mnav.open{display:flex;flex-direction:column;gap:2px;padding:12px 16px;background:#111;border-top:1px solid var(--border)}
.hambtn{display:none;background:none;border:1px solid var(--border);color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:.9rem}
@media(max-width:1300px){.hright .hsm{display:none}}@media(max-width:900px){.hright .gmb-header{display:none}}
@media(max-width:768px){nav{display:none}.hambtn{display:block}.hright .gmb-header,.hright .hsm,.hright .hphone,.ni-rtb-btn{display:none}.hright a.btn.bg[href*="portfolio"]{display:none}.hbar{gap:10px;padding:0 12px}.hright{gap:8px}.hright .btn.bo{font-size:.78rem;padding:8px 14px}}
</style>
<style>
/* NEW HERO STYLES */
.hero-new{position:relative;width:100%;height:100vh;min-height:560px;overflow:hidden;background:#0d0d0d}
.hero-new .slide{position:absolute;inset:0;opacity:0;transition:opacity .15s;pointer-events:none}
.hero-new .slide.active{opacity:1;pointer-events:all}
.hero-new .slide-bg{position:absolute;inset:-5%;width:110%;height:110%;background-size:cover;background-position:center;animation:none;will-change:transform;contain:strict}
.hero-new .slide.active .slide-bg{animation:kenburns 6s ease-in-out forwards}
@keyframes kenburns{0%{transform:scale(1.08) translate(2%,1%)}100%{transform:scale(1) translate(0%,0%)}}
.hero-new .overlay-gradient{position:absolute;will-change:transform;inset:0;left:0;width:6px;background:#FFD700;transition:transform .8s cubic-bezier(.16,1,.3,1);transform-origin:top}
.hero-new .accent-bar.top{top:0;height:42%;transform:scaleY(0)}
.hero-new .accent-bar.bot{bottom:0;height:42%;transform:scaleY(0);transform-origin:bottom}
.hero-new .slide.active .accent-bar.top{transform:scaleY(1);transition-delay:.3s}
.hero-new .slide.active .accent-bar.bot{transform:scaleY(1);transition-delay:.5s}
.hero-new .slide-content{position:absolute;left:80px;top:50%;transform:translateY(-50%);z-index:10}
.hero-new .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:#FFD700;opacity:0;transform:translateX(-30px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
.hero-new .slide.active .eyebrow{opacity:1;transform:translateX(0);transition-delay:.2s}
.hero-new .headline{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,10vw,120px);line-height:.95;color:#fff;white-space:pre-line;opacity:0;transform:translateX(-40px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1);text-shadow:0 4px 30px rgba(0,0,0,.5);margin:12px 0}
.hero-new .slide.active .headline{opacity:1;transform:translateX(0);transition-delay:.4s}
.hero-new .headline span{color:#FFD700}
.hero-new .subline{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:400;letter-spacing:2px;color:rgba(255,255,255,.75);opacity:0;transform:translateX(-30px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);margin-top:4px}
.hero-new .slide.active .subline{opacity:1;transform:translateX(0);transition-delay:.6s}
.hero-new .cta-btn{display:inline-block;margin-top:28px;padding:14px 36px;background:#FFD700;color:#0d0d0d;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;text-decoration:none;opacity:0;transform:translateY(20px);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1);cursor:pointer;border:none;position:relative;overflow:hidden}
.hero-new .cta-btn::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);transform:translateX(-101%);transition:transform .3s ease}
.hero-new .cta-btn:hover::after{transform:translateX(0)}
.hero-new .slide.active .cta-btn{opacity:1;transform:translateY(0);transition-delay:.8s}
.hero-new .dots{position:absolute;bottom:36px;left:80px;display:flex;gap:10px;z-index:20}
.hero-new .dot{width:28px;height:4px;background:rgba(255,255,255,.25);cursor:pointer;transition:transform .3s,background .3s;transform-origin:left;position:relative;overflow:hidden}
.hero-new .dot.active{background:rgba(255,255,255,.2);width:56px}
.hero-new .dot.active::after{content:'';position:absolute;inset:0;background:#FFD700;animation:dotfill var(--duration,2.5s) linear forwards}
@keyframes dotfill{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
.hero-new .counter{position:absolute;bottom:38px;right:48px;font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,.65);letter-spacing:2px;z-index:20}
.hero-new .counter em{color:#FFD700;font-style:normal}
.hero-new .scanlines{position:absolute;inset:0;pointer-events:none;z-index:15}
.hero-new .nav-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:20;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:#FFD700;font-size:28px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.hero-new .nav-btn:hover{background:rgba(255,215,0,.25)}
.hero-new .nav-prev{left:20px}
.hero-new .nav-next{right:20px}
.hero-new .diag-stripe{position:absolute;bottom:0;right:0;width:320px;height:100%;pointer-events:none;z-index:5}
@media(max-width:768px){
  .hero-new{height:70vh;min-height:420px}
  .hero-new .slide-bg{inset:0;width:100%;height:100%}
  .hero-new .slide-content{left:24px;right:24px}
  .hero-new .dots{left:24px}
  .hero-new .nav-btn{display:none}
  .hero-new .headline{font-size:clamp(36px,10vw,60px)}
  .hero-new .counter{display:none}
  .hero-new .diag-stripe{display:none}
}
@media(max-width:480px){
  .hero-new{height:60vh;min-height:360px}
  .hero-new .headline{font-size:clamp(32px,9vw,48px)}
  .hero-new .cta-btn{padding:12px 28px;font-size:18px}
  .hero-new .eyebrow{font-size:12px;letter-spacing:3px}
  .hero-new .subline{font-size:15px}
}
</style>
<style>
.ba-slider-section{padding:60px 0;background:#111;}
.ba-slider-title{text-align:center;color:#c9a84c;font-size:2rem;margin-bottom:2rem;}
.ba-slider{position:relative;width:100%;max-width:900px;margin:0 auto;aspect-ratio:16/9;overflow:hidden;border-radius:12px;cursor:col-resize;user-select:none;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.ba-after,.ba-before{position:absolute;inset:0;background-size:cover;background-position:center;}
.ba-before{clip-path:inset(0 50% 0 0);}
/* ba-label styles moved to site.css */
.ba-handle{position:absolute;top:0;left:50%;transform:translateX(-50%);width:44px;height:100%;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.ba-handle-line{flex:1;width:2px;background:rgba(255,255,255,.9);}
.ba-handle-circle{width:44px;height:44px;background:#c9a84c;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:50%;transform:translateY(-50%);box-shadow:0 2px 12px rgba(0,0,0,.4);}
</style>
<style>
#img-lightbox { display:none !important; }
#img-lightbox.active { display:flex !important; }
#img-lightbox img { animation: lbZoomIn .25s ease-out; }
@keyframes lbZoomIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
</style>
<style>
/* ============================================
   CFW STITCH DESIGN SYSTEM — Google Stitch Export
   Appended to all pages via _template_styles.html
   ============================================ */

/* Stitch Color Tokens */
:root {
  --stitch-yellow:       #FFD700;
  --stitch-yellow-dim:   #E9C400;
  --stitch-yellow-light: #FFE16D;
  --stitch-bg:           #131313;
  --stitch-surface:      #1C1B1B;
  --stitch-surface-mid:  #201F1F;
  --stitch-surface-high: #2A2A2A;
  --stitch-surface-top:  #353534;
  --stitch-on-primary:   #3A3000;
  --stitch-text:         #E5E2E1;
  --stitch-muted:        #9CA3AF;
  --stitch-dim:          #6B7280;
  --stitch-border:       rgba(255,255,255,0.05);
  --stitch-radius:       0.125rem;
}

/* Stitch Component Classes */
.stitch-card {
  background: var(--stitch-surface);
  border-radius: var(--stitch-radius);
  overflow: hidden;
}
.stitch-card-header {
  padding: 1.5rem;
  background: var(--stitch-surface-mid);
  border-bottom: 1px solid var(--stitch-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.stitch-btn {
  background: var(--stitch-yellow);
  color: var(--stitch-on-primary);
  padding: 0.75rem 1.5rem;
  font-family: 'Space Grotesk', 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border: none;
  border-radius: var(--stitch-radius);
  cursor: pointer;
  transition: transform 0.15s;
  text-decoration: none;
  display: inline-block;
}
.stitch-btn:hover  { background: var(--stitch-yellow-dim); color: var(--stitch-on-primary); }
.stitch-btn:active { transform: scale(0.95); }
.stitch-badge {
  display: inline-block;
  background: var(--stitch-yellow);
  color: var(--stitch-on-primary);
  font-size: 0.5625rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.125rem 0.5rem;
  border-radius: var(--stitch-radius);
}
.stitch-stat {
  background: var(--stitch-surface);
  padding: 1rem;
  border-radius: var(--stitch-radius);
}
.stitch-stat-label {
  font-size: 0.5625rem;
  color: var(--stitch-dim);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: block;
}
.stitch-stat-value {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  margin-top: 0.25rem;
}
.stitch-text-yellow { color: var(--stitch-yellow) !important; }
.stitch-bg-surface  { background: var(--stitch-surface-mid) !important; }
.stitch-border-faint { border: 1px solid var(--stitch-border) !important; }
.stitch-fab {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 3.5rem;
  height: 3.5rem;
  background: var(--stitch-yellow);
  color: var(--stitch-on-primary);
  border-radius: var(--stitch-radius);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  transition: transform 0.15s;
  z-index: 50;
  font-size: 1.5rem;
  font-weight: 900;
  text-decoration: none;
}
.stitch-fab:hover  { transform: scale(1.05); }
.stitch-fab:active { transform: scale(0.95); }
</style>
