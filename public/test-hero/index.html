<!DOCTYPE html>
<html><head>
<style>
:root { --dark: #0a0a0a; }
.page-hero-banner{position:relative;min-height:55vh;height:55vh;max-height:72vh;display:flex;align-items:flex-end;overflow:hidden;background:var(--dark);width:100%}
.page-hero-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
.page-hero-banner::after{content:'';position:absolute;inset:0;z-index:1;z-index:2;max-width:1140px;margin:0 auto;padding:48px 24px 40px;width:100%}
</style>
</head><body>
<section class="page-hero-banner" style="min-height:55vh;height:55vh;max-height:72vh;position:relative;overflow:hidden;display:flex;align-items:flex-end">
<picture>
  <source srcset="/images/studio/mh-equipment-cargo-van-wrap.avif" type="image/avif"/>
  <img src="https://chicagofleetwraps.com/images/studio/mh-equipment-cargo-van-wrap.webp" 
       alt="test" fetchpriority="high" decoding="async" width="1280" height="720" 
       style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0"/>
</picture>
<div style="position:absolute;inset:0;z-index:1;background:linear-gradient(to right,rgba(0,0,0,.78) 0%,rgba(0,0,0,.45) 55%,rgba(0,0,0,.1) 100%);pointer-events:none"></div>
<div style="position:relative;z-index:10;padding:56px 32px 44px;max-width:720px;width:100%">
<h1 style="color:#fff;font-size:3rem">TEST HERO — Fleet Wraps Chicago</h1>
</div>
</section>
<p style="color:red;font-size:2rem">Content below hero</p>
</body></html>
