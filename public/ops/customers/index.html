<header>

  <nav class="nav-ops">

    <a href="/ops/leads/">Leads</a>
    <a href="/ops/today/">Today</a>
    <a href="/ops/customers/" class="active">Customers</a>
  </nav>
</header>
<div class="wrap">
  <h2>Customer Lifecycle</h2>
  <div class="stats" id="stats"></div>
  <h2 style="margin-top:24px">Active Customers</h2>
  <div id="table-wrap"></div>
</div>
<script>
const SB = "https://vqjrldzmthbkayjzatnl.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxanJsZHptdGhia2F5anphdG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxMTk1MzYsImV4cCI6MjA1NzY5NTUzNn0.mMlM8E-cEpBsVEMnMnMmcVBLfHqOp7cQJpuWPFaMbwA";

function esc(s){return String(s||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}

async function q(path){
  const r = await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  return r.ok ? await r.json() : [];
}

async function load(){
  const customers = await q("customers?select=*&order=created_at.desc");
  const installs = await q("installs?select=customer_id,revenue");

  const total = customers.length;
  const active = customers.filter(c => c.lifecycle_stage === 'active').length;
  const dormant = customers.filter(c => c.lifecycle_stage === 'dormant').length;
  const revenue = installs.reduce((s, i) => s + (parseFloat(i.revenue)||0), 0);
  const installCount = installs.length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Customers</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
    <div class="stat"><div class="stat-label">Dormant</div><div class="stat-value">${dormant}</div></div>
    <div class="stat"><div class="stat-label">Installs</div><div class="stat-value">${installCount}</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-value">$${(revenue/1000).toFixed(0)}k</div></div>
  `;

  if (customers.length === 0) {
    document.getElementById('table-wrap').innerHTML = `
      <div class="empty">
        <h3>No customers yet</h3>
        <p>When a lead closes, mark them "booked" on the Today page and they'll convert to a customer here.</p>
        <p style="margin-top:12px;font-size:12px">Retention sequences auto-trigger on customer creation: review requests, anniversary check-ins, expansion triggers.</p>
      </div>`;
    return;
  }

  const rows = customers.map(c => `
    <tr>
      <td><strong>${esc(c.company_name)}</strong></td>
      <td>${esc(c.primary_contact_name)||'<span class="no-data">—</span>'}</td>
      <td>${esc(c.primary_contact_email)||'<span class="no-data">—</span>'}</td>
      <td><span class="stage stage-${c.lifecycle_stage||'new'}">${esc(c.lifecycle_stage||'new')}</span></td>
      <td>${c.install_count||0}</td>
      <td>$${(parseFloat(c.total_revenue)||0).toLocaleString()}</td>
      <td>${c.referral_code||'<span class="no-data">—</span>'}</td>
      <td>${c.next_touch_date||'<span class="no-data">none</span>'}</td>
    </tr>
  `).join('');
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Company</th><th>Contact</th><th>Email</th><th>Stage</th><th>Installs</th><th>Revenue</th><th>Referral Code</th><th>Next Touch</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

load();
</script>
</body>
