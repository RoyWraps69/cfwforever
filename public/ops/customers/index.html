<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CFW Retention — Customer Lifecycle</title>
<style>
  :root { --gold:#FFD700; --black:#0A0A0A; --panel:#111; --border:#222; --mid:#888; --text:#eee; --ok:#14b8a6; --warn:#f59e0b; --err:#ef4444; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:14px; line-height:1.5; }
  header { padding:20px 32px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:20px; font-weight:800; letter-spacing:2px; color:var(--gold); }
  nav.nav-ops { display:flex; gap:22px; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  nav.nav-ops a { color:#666; text-decoration:none; padding:6px 0; border-bottom:2px solid transparent; transition:color .2s,border-color .2s; }
  nav.nav-ops a:hover, nav.nav-ops a.active { color:var(--gold); border-bottom-color:var(--gold); }
  .wrap { max-width:1400px; margin:0 auto; padding:24px 32px; }
  h2 { font-size:14px; color:var(--mid); letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; font-weight:700; }
  .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
  .stat { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .stat-label { font-size:11px; color:var(--mid); text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-size:28px; font-weight:800; color:var(--gold); margin-top:4px; }
  .empty { padding:60px 20px; text-align:center; color:var(--mid); background:var(--panel); border-radius:8px; }
  .empty h3 { color:var(--text); font-size:16px; margin-bottom:8px; }
  table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:8px; overflow:hidden; }
  thead { background:#0a0a0a; }
  th { text-align:left; padding:12px 16px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--mid); font-weight:700; border-bottom:1px solid var(--border); }
  td { padding:12px 16px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  .stage { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .stage-new { background:rgba(20,184,166,.15); color:var(--ok); }
  .stage-active { background:rgba(255,215,0,.15); color:var(--gold); }
  .stage-dormant { background:rgba(245,158,11,.15); color:var(--warn); }
  .stage-churned { background:rgba(239,68,68,.15); color:var(--err); }
  .no-data { font-style:italic; color:var(--mid); }
  button { background:var(--gold); color:var(--black); border:none; padding:8px 16px; font-weight:700; letter-spacing:1px; cursor:pointer; border-radius:4px; font-size:12px; text-transform:uppercase; }
  button:hover { opacity:0.9; }
</style>
<!-- RB2B visitor identification -->

<body>
<header>
  <h1>CFW RETENTION</h1>
  <nav class="nav-ops">
    <a href="/ops/">Dashboard</a>
    <a href="/ops/leads/">Leads</a>
    <a href="/ops/today/">Today</a>
    <a href="/ops/customers/" class="active">Customers</a>
  </nav>
</header>
<div class="wrap">
  <h2>Customer Lifecycle</h2>
  <div class="stats" id="stats"></div>
  <h2 style="margin-top:24px">Active Customers</h2>
  <div id="table-wrap"></div>
</div>
<script>
const SB = "https://vqjrldzmthbkayjzatnl.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxanJsZHptdGhia2F5anphdG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxMTk1MzYsImV4cCI6MjA1NzY5NTUzNn0.mMlM8E-cEpBsVEMnMnMmcVBLfHqOp7cQJpuWPFaMbwA";

function esc(s){return String(s||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}

async function q(path){
  const r = await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});
  return r.ok ? await r.json() : [];
}

async function load(){
  const customers = await q("customers?select=*&order=created_at.desc");
  const installs = await q("installs?select=customer_id,revenue");

  const total = customers.length;
  const active = customers.filter(c => c.lifecycle_stage === 'active').length;
  const dormant = customers.filter(c => c.lifecycle_stage === 'dormant').length;
  const revenue = installs.reduce((s, i) => s + (parseFloat(i.revenue)||0), 0);
  const installCount = installs.length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Customers</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
    <div class="stat"><div class="stat-label">Dormant</div><div class="stat-value">${dormant}</div></div>
    <div class="stat"><div class="stat-label">Installs</div><div class="stat-value">${installCount}</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-value">$${(revenue/1000).toFixed(0)}k</div></div>
  `;

  if (customers.length === 0) {
    document.getElementById('table-wrap').innerHTML = `
      <div class="empty">
        <h3>No customers yet</h3>
        <p>When a lead closes, mark them "booked" on the Today page and they'll convert to a customer here.</p>
        <p style="margin-top:12px;font-size:12px">Retention sequences auto-trigger on customer creation: review requests, anniversary check-ins, expansion triggers.</p>
      </div>`;
    return;
  }

  const rows = customers.map(c => `
    <tr>
      <td><strong>${esc(c.company_name)}</strong></td>
      <td>${esc(c.primary_contact_name)||'<span class="no-data">—</span>'}</td>
      <td>${esc(c.primary_contact_email)||'<span class="no-data">—</span>'}</td>
      <td><span class="stage stage-${c.lifecycle_stage||'new'}">${esc(c.lifecycle_stage||'new')}</span></td>
      <td>${c.install_count||0}</td>
      <td>$${(parseFloat(c.total_revenue)||0).toLocaleString()}</td>
      <td>${c.referral_code||'<span class="no-data">—</span>'}</td>
      <td>${c.next_touch_date||'<span class="no-data">none</span>'}</td>
    </tr>
  `).join('');
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Company</th><th>Contact</th><th>Email</th><th>Stage</th><th>Installs</th><th>Revenue</th><th>Referral Code</th><th>Next Touch</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

load();
</script>
</body>
</html>
