<body>
<div class="topbar">
  <div class="brand">CFW OPS</div>
  <nav class="nav-ops">
    <a href="/ops/">Dashboard</a>
    <a href="/ops/leads/">Leads</a>
    <a href="/ops/today/" class="active">Today</a>
  </nav>
</div>
<div class="container">
  <div class="hero">
    <h1>TODAY'S QUEUE</h1>
    <p id="hero-date">Loading...</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="stat-total">—</div><div class="label">Total Today</div></div>
    <div class="stat"><div class="num" id="stat-calls">—</div><div class="label">Calls</div></div>
    <div class="stat"><div class="num" id="stat-emails">—</div><div class="label">Emails</div></div>
    <div class="stat"><div class="num" id="stat-done">—</div><div class="label">Completed</div></div>
  </div>
  <div id="content"><div class="loading"><span class="spin"></span>Loading...</div></div>
</div>
<div id="toast" class="toast"></div>
<script>
const SB = "https://vqjrldzmthbkayjzatnl.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxanJsZHptdGhia2F5anphdG5sIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzY1MDMzNiwiZXhwIjoyMDg5MjI2MzM2fQ.tQxQ4KoTyfGzeX2fsvTYHtFfZg1BVL0P7J0sYUfmeRU";
const MODE_NAMES = {teddy_bear:{name:"Teddy Bear",emoji:"🧸"},hat_in_hand:{name:"Hat in Hand",emoji:"🎩"},hat_in_hand_swagger:{name:"Humble Confident",emoji:"🎩⚡"},swagger:{name:"Swagger",emoji:"⚡"},local_pride:{name:"Local Pride",emoji:"🏙️"},mentor:{name:"Mentor",emoji:"🎓"},urgency:{name:"Urgency",emoji:"🚨"}};
const CHANNEL_EMOJI = {call:"📞",email:"✉️",linkedin_msg:"in",drive_by:"🚗",letter:"✉",research:"🔍",text_message:"💬"};
function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg,type){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(type==="err"?" err":"");setTimeout(()=>t.classList.remove("show"),3000);}
async function q(path){const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});return r.ok?await r.json():[];}
function todayStr(){return new Date().toISOString().slice(0,10);}
function formatDate(){const d=new Date();const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];const months=["January","February","March","April","May","June","July","August","September","October","November","December"];return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}
function initials(name){if(!name)return"?";return name.split(/\s+/).slice(0,2).map(s=>(s[0]||"").toUpperCase()).join("");}
async function load(){
  document.getElementById("hero-date").textContent = formatDate();
  const today = todayStr();
  const actions = await q(`actions_queue?status=eq.pending&due_date=lte.${today}&order=due_date.asc,created_at.asc`);
  if(!actions.length){
    document.getElementById("content").innerHTML = `<div class="empty-state"><h2>NO ACTIONS FOR TODAY</h2><p>Every lead either completed its touch for today, or is waiting on a future date.</p><p style="margin-top:14px;font-size:12px;color:var(--dim)">Go to <a href="/ops/leads/" style="color:var(--gold)">Leads</a> to enrich more prospects.</p></div>`;
    setStats([],0); return;
  }
  const dmIds = [...new Set(actions.map(a=>a.decision_maker_id).filter(Boolean))];
  const jobIds = [...new Set(actions.map(a=>a.job_id).filter(Boolean))];
  const [dms,jobs] = await Promise.all([
    dmIds.length ? q(`decision_makers?id=in.(${dmIds.join(",")})&select=id,full_name,title,email,phone,linkedin_url,approach_mode`) : [],
    jobIds.length ? q(`jobs?id=in.(${jobIds.join(",")})&select=id,customer_name`) : [],
  ]);
  const dmMap = Object.fromEntries(dms.map(d=>[d.id,d]));
  const jobMap = Object.fromEntries(jobs.map(j=>[j.id,j]));
  const completed = await q(`actions_queue?status=eq.completed&outcome_logged_at=gte.${today}T00:00:00Z&select=id`);
  setStats(actions, completed.length);
  document.getElementById("content").innerHTML = actions.map(a => renderAction(a, dmMap[a.decision_maker_id], jobMap[a.job_id])).join("");
}
function setStats(actions, completedToday){
  document.getElementById("stat-total").textContent = actions.length;
  document.getElementById("stat-calls").textContent = actions.filter(a=>a.action_type==="call").length;
  document.getElementById("stat-emails").textContent = actions.filter(a=>a.action_type==="email").length;
  document.getElementById("stat-done").textContent = completedToday;
}
function renderAction(a, dm, job){
  const mode = dm?.approach_mode || "hat_in_hand";
  const modeMeta = MODE_NAMES[mode] || {name:mode, emoji:""};
  const channelEmoji = CHANNEL_EMOJI[a.action_type] || "•";
  const jobName = job?.customer_name || "(unknown company)";
  const dmName = dm?.full_name || "(unknown DM)";
  const title = dm?.title || "";
  const exactTime = a.scheduled_for ? new Date(a.scheduled_for).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}) : "";
  const callOutcomes = [
    {v:"booked",label:"✓ Booked",cls:"oc-booked"},
    {v:"voicemail",label:"Voicemail",cls:""},
    {v:"no_answer",label:"No Answer",cls:""},
    {v:"wrong_number",label:"Wrong #",cls:""},
    {v:"not_interested",label:"Not Interested",cls:"oc-not_interested"},
    {v:"call_back_later",label:"Call Later",cls:""},
    {v:"replied_positive",label:"Positive Chat",cls:"oc-replied_positive"},
    {v:"other",label:"Other",cls:""},
  ];
  const emailOutcomes = [
    {v:"booked",label:"✓ Booked",cls:"oc-booked"},
    {v:"replied_positive",label:"Good Reply",cls:"oc-replied_positive"},
    {v:"replied_question",label:"Has Questions",cls:""},
    {v:"replied_negative",label:"Rejected",cls:"oc-replied_negative"},
    {v:"opened",label:"Opened Only",cls:""},
    {v:"clicked",label:"Clicked",cls:""},
    {v:"bounced",label:"Bounced",cls:""},
    {v:"unsubscribed",label:"Unsub",cls:"oc-replied_negative"},
  ];
  const researchOutcomes = [
    {v:"other",label:"✓ Done",cls:"oc-booked"},
    {v:"not_interested",label:"Disqualified",cls:"oc-replied_negative"},
  ];
  const outcomes = a.action_type==="call" ? callOutcomes : a.action_type==="email" ? emailOutcomes : researchOutcomes;
  const btnsHtml = outcomes.map(o=>`<button class="oc-btn ${o.cls}" data-action-id="${a.id}" data-outcome="${o.v}">${esc(o.label)}</button>`).join("");
  const contactsHtml = [
    dm?.email ? `<a href="mailto:${esc(dm.email)}">${esc(dm.email)}</a>` : "",
    dm?.phone ? `<a href="tel:${esc(dm.phone)}">${esc(dm.phone)}</a>` : "",
    dm?.linkedin_url ? `<a href="${esc(dm.linkedin_url)}" target="_blank">LinkedIn</a>` : "",
  ].filter(Boolean).join(" · ");
  return `<div class="action-card" data-action-id="${a.id}"><div class="action-header"><div style="flex:1"><div class="action-title">${channelEmoji} ${esc(a.title)}<span class="channel-badge ch-${a.action_type}">${esc(a.action_type)}</span></div><div class="action-meta"><strong>${esc(jobName)}</strong> · ${exactTime?`scheduled ${esc(exactTime)}`:"due today"} · ~${a.estimated_duration_min||"?"} min<span class="mode-tag mode-${mode}" style="margin-left:10px">${modeMeta.emoji} ${modeMeta.name}</span></div></div><a href="/ops/leads/view/?id=${encodeURIComponent(a.job_id||'')}" class="link-full">Full Intel →</a></div><div class="dm-block"><div class="dm-avatar">${esc(initials(dmName))}</div><div class="dm-info"><div class="dm-name">${esc(dmName)}</div><div class="dm-title">${esc(title)}</div>${contactsHtml?`<div class="dm-contacts">${contactsHtml}</div>`:""}</div></div>${a.body?`<div class="script-label">SCRIPT / TALK TRACK</div><div class="script-box">${esc(a.body)}</div>`:""}<div class="script-label">MARK OUTCOME</div><div class="outcome-buttons">${btnsHtml}</div></div>`;
}
async function logOutcome(actionId, outcome, btn){
  document.querySelectorAll(`[data-action-id="${actionId}"].oc-btn`).forEach(b=>b.disabled=true);
  btn.textContent = "…";
  try {
    const r = await fetch(`${SB}/functions/v1/action-outcome`,{method:"POST",headers:{Authorization:`Bearer ${KEY}`,"Content-Type":"application/json"},body:JSON.stringify({action_id:actionId,outcome})});
    if(!r.ok) throw new Error(await r.text());
    await r.json();
    toast(`Logged: ${outcome}`);
    const card = document.querySelector(`.action-card[data-action-id="${actionId}"]`);
    if(card){card.style.transition="opacity .3s";card.style.opacity="0.3";setTimeout(()=>{card.style.display="none";load();},500);}
  } catch(e){
    toast(`Error: ${String(e.message||e).slice(0,80)}`,"err");
    document.querySelectorAll(`[data-action-id="${actionId}"].oc-btn`).forEach(b=>b.disabled=false);
  }
}
document.addEventListener("click", ev => {
  const btn = ev.target.closest("[data-outcome]");
  if(!btn) return;
  const actionId = btn.dataset.actionId;
  const outcome = btn.dataset.outcome;
  if(actionId && outcome) logOutcome(actionId, outcome, btn);
});
load();
</script>
</body>
</html>
