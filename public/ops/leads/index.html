<body>
<header>
  <h1>CFW LEADS</h1>
  <nav class="nav-ops">
    <a href="/ops/">Dashboard</a>
    <a href="/ops/leads/" class="active">Leads</a>
    <a href="/ops/today/">Today</a>
    <a href="/ops/customers/">Customers</a>
  </nav>
</header>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="filter-tabs" id="filter-tabs">
      <div class="filter-tab active" data-filter="all">All</div>
      <div class="filter-tab" data-filter="hot">Hot</div>
      <div class="filter-tab" data-filter="warm">Warm</div>
      <div class="filter-tab" data-filter="uncontacted">Uncontacted</div>
      <div class="filter-tab" data-filter="enriched">Enriched</div>
      <div class="filter-tab" data-filter="dead">Dead</div>
    </div>
    <button id="auto10" onclick="runBatch(this, 10)">🚀 Auto-Enrich Top 10</button>
    <button class="ghost" onclick="runBatch(this, 25)">Enrich 25</button>
    <select id="tier-filter" onchange="render()">
      <option value="all">All Tiers</option>
      <option value="A">Tier A (HVAC/Plumb/Elec/Mover)</option>
      <option value="B">Tier B (Landscape/Roof/Pest)</option>
      <option value="C">Tier C (Dealer/Tow/Other)</option>
    </select>
  </div>
  <div id="table-wrap" class="loading">Loading leads...</div>
</div>
<script>
const SB = "https://vqjrldzmthbkayjzatnl.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxanJsZHptdGhia2F5anphdG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIxMTk1MzYsImV4cCI6MjA1NzY5NTUzNn0.mMlM8E-cEpBsVEMnMnMmcVBLfHqOp7cQJpuWPFaMbwA";
const SR = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxanJsZHptdGhia2F5anphdG5sIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzY1MDMzNiwiZXhwIjoyMDg5MjI2MzM2fQ.tQxQ4KoTyfGzeX2fsvTYHtFfZg1BVL0P7J0sYUfmeRU";

let allLeads = [];
let currentFilter = "all";

function esc(s){return String(s||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}
function toast(msg,type){const t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),5000)}
async function q(path){ const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}}); return r.ok?await r.json():[]; }

async function load(){
  const jobs = await q(`jobs?metro_slug=eq.chicago&select=id,customer_name,priority,fit_score,contactability_score,industry_category,tier,fleet_size,source,primary_decision_maker_id,city&order=fit_score.desc.nullslast&limit=500`);
  const dmIds = jobs.filter(j=>j.primary_decision_maker_id).map(j=>j.primary_decision_maker_id);
  const dms = dmIds.length ? await q(`decision_makers?id=in.(${dmIds.join(',')})&select=id,full_name,title,email,email_verified,phone,linkedin_url,approach_mode,intel_package`) : [];
  const dmMap = {}; dms.forEach(d=>{dmMap[d.id]=d});
  allLeads = jobs.map(j=>({...j, dm: dmMap[j.primary_decision_maker_id]||null}));
  renderStats();
  render();
}

function renderStats(){
  const byP={}; allLeads.forEach(l=>{byP[l.priority||'?']=(byP[l.priority||'?']||0)+1});
  const enriched = allLeads.filter(l => l.dm && l.dm.intel_package).length;
  const fit60 = allLeads.filter(l => l.fit_score >= 60).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${allLeads.length}</div></div>
    <div class="stat stat-hot"><div class="stat-label">Hot</div><div class="stat-value">${byP.hot||0}</div></div>
    <div class="stat stat-warm"><div class="stat-label">Warm</div><div class="stat-value">${byP.warm||0}</div></div>
    <div class="stat"><div class="stat-label">Uncontacted</div><div class="stat-value">${byP.uncontacted||0}</div></div>
    <div class="stat"><div class="stat-label">Enriched</div><div class="stat-value">${enriched}</div></div>
    <div class="stat"><div class="stat-label">Fit 60+</div><div class="stat-value">${fit60}</div></div>`;
}

function render(){
  const tf = document.getElementById('tier-filter').value;
  let rows = allLeads;
  if(currentFilter==='hot') rows = rows.filter(l=>l.priority==='hot');
  else if(currentFilter==='warm') rows = rows.filter(l=>l.priority==='warm');
  else if(currentFilter==='uncontacted') rows = rows.filter(l=>l.priority==='uncontacted');
  else if(currentFilter==='enriched') rows = rows.filter(l=>l.dm && l.dm.intel_package);
  else if(currentFilter==='dead') rows = rows.filter(l=>l.priority==='dead'||l.priority==='disqualified');
  if(tf !== 'all') rows = rows.filter(l=>l.tier===tf);
  rows = rows.slice(0, 150);

  if(rows.length === 0){ document.getElementById('table-wrap').innerHTML = '<div class="loading">No leads match this filter.</div>'; return; }

  document.getElementById('table-wrap').innerHTML = `<table>
    <thead><tr>
      <th>Priority</th><th>Tier</th><th>Company</th><th>Decision Maker</th><th>Contact</th>
      <th>Fit</th><th>Ctc</th><th>Fleet</th><th>City</th><th>Action</th>
    </tr></thead>
    <tbody>${rows.map(l => {
      const dm = l.dm;
      const email = dm?.email ? `<span class="dm-email">${esc(dm.email)}${dm.email_verified?' ✓':''}</span>` : '<span class="no-data">—</span>';
      const phone = dm?.phone ? `<span class="dm-email">${esc(dm.phone)}</span>` : '';
      const dmCell = dm ? `<div><span class="dm-name">${esc(dm.full_name||'?')}</span><br><span class="dm-email">${esc(dm.title||'')}</span></div>` : '<span class="no-data">Not enriched</span>';
      const actionCell = dm?.intel_package 
        ? `<a href="/ops/leads/view/?id=${l.id}" class="link">Full Intel →</a>`
        : `<button onclick="enrichOne('${l.id}',this)" style="padding:4px 10px;font-size:11px">Enrich</button>`;
      return `<tr>
        <td><span class="pill pill-${l.priority||'?'}">${esc(l.priority||'?')}</span></td>
        <td><span class="tier tier-${l.tier||'C'}">${esc(l.tier||'?')}</span></td>
        <td><strong>${esc(l.customer_name||'?')}</strong><br><span class="dm-email">${esc(l.industry_category||'?')}</span></td>
        <td>${dmCell}</td>
        <td>${email}${phone?'<br>'+phone:''}</td>
        <td>${l.fit_score??'—'}</td><td>${l.contactability_score??'—'}</td><td>${l.fleet_size||'?'}</td><td>${esc(l.city||'')}</td>
        <td>${actionCell}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

document.querySelectorAll('.filter-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });
});

async function runBatch(btn, limit){
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '🔄 Starting...';
  try {
    const r = await fetch(`${SB}/functions/v1/batch-enrich`,{
      method:'POST',
      headers:{Authorization:`Bearer ${SR}`,'Content-Type':'application/json'},
      body:JSON.stringify({limit, min_fit:60, concurrency:3})
    });
    if(!r.ok) throw new Error(await r.text());
    const data = await r.json();
    toast(`${data.queued||limit} leads queued — auto-enriching in background. Refresh in ${data.estimated_completion_min||3}-5 min.`, 'ok');
    setTimeout(load, 60000);
    setTimeout(load, 180000);
    btn.disabled = false;
    btn.textContent = orig;
  } catch(e) {
    toast('Failed: ' + String(e.message).slice(0,100), 'err');
    btn.disabled = false;
    btn.textContent = orig;
  }
}

async function enrichOne(jobId, btn){
  btn.disabled = true;
  btn.textContent = '…signals';
  try {
    await fetch(`${SB}/functions/v1/lead-signals`,{method:'POST',headers:{Authorization:`Bearer ${SR}`,'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})}).catch(()=>{});
    btn.textContent = '…profile';
    const r1 = await fetch(`${SB}/functions/v1/lead-enrich`,{method:'POST',headers:{Authorization:`Bearer ${SR}`,'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId,force:true})});
    if(!r1.ok) throw new Error('Enrich: '+(await r1.text()).slice(0,80));
    const er = await r1.json();
    if(!er.decision_maker_id){ btn.textContent='No DM'; return; }
    btn.textContent = '…intel';
    await fetch(`${SB}/functions/v1/lead-intel`,{method:'POST',headers:{Authorization:`Bearer ${SR}`,'Content-Type':'application/json'},body:JSON.stringify({decision_maker_id:er.decision_maker_id,force:true})});
    btn.textContent = '✓';
    toast('Enriched!', 'ok');
    setTimeout(load, 2000);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Retry';
    toast(String(e.message).slice(0,80), 'err');
  }
}

window.runBatch = runBatch;
window.enrichOne = enrichOne;
load();
setInterval(load, 120000);
</script>
</body>
</html>
