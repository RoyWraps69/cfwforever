async function q(path){const r=await fetch(`${SB}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}});return r.ok?await r.json():[]}

async function load(){

  const jobs=await q(`jobs?id=eq.${id}&select=*`);
  if(!jobs.length){document.getElementById('content').innerHTML='<div class="not-enriched"><h2>LEAD NOT FOUND</h2><a href="/ops/leads/"><button>← Back</button></a></div>';return}
  const job=jobs[0];

  let dm=null;
  if(job.primary_decision_maker_id){
    const dms=await q(`decision_makers?id=eq.${job.primary_decision_maker_id}&select=*`);

  }

}

async function enrichNow(jobId,btn){
  btn.disabled=true;btn.textContent='Gathering signals…';
  try{
    // Phase 4a: lead-signals (Google Places + website + news + BBB)
    await fetch(`${SB}/functions/v1/lead-signals`,{method:'POST',headers:{Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})}).catch(()=>{});
    btn.textContent='Building profile (~45s)…';
    // Phase A: lead-enrich (Apollo + Hunter + Claude profile)
    const r1=await fetch(`${SB}/functions/v1/lead-enrich`,{method:'POST',headers:{Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId,force:true})});
    if(!r1.ok) throw new Error('Enrich failed: '+await r1.text());
    const enrichResult=await r1.json();
    const dmId=enrichResult.decision_maker_id;
    if(!dmId){toast('No decision maker found','err');btn.disabled=false;btn.textContent='⚡ Retry';return}

    // Phase B: lead-intel (Claude 11-section package)
    btn.textContent='Building intel (~50s)…';
    const r2=await fetch(`${SB}/functions/v1/lead-intel`,{method:'POST',headers:{Authorization:`Bearer ${KEY}`,'Content-Type':'application/json'},body:JSON.stringify({decision_maker_id:dmId,force:true})});
    if(!r2.ok) throw new Error('Intel failed: '+await r2.text());
    toast('Fully enriched! Reloading…');setTimeout(()=>location.reload(),1500);
  }catch(e){btn.disabled=false;btn.textContent='⚡ Retry';toast(String(e.message||e).slice(0,120),'err')}
}
window.enrichNow=enrichNow;

function renderScriptBlock(label,text){
  if(!text)return '';
  const encoded = encodeURIComponent(text);
  return `<div class="script-label">${esc(label)}</div><div class="script-block">${esc(text)}<button class="copy-btn" data-copy-text="${encoded}">Copy</button></div>`;
}

async function markDone(dmId){
  const r=await fetch(`${SB}/rest/v1/actions_queue?decision_maker_id=eq.${dmId}&status=eq.pending`,{method:'PATCH',headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'done',completed_at:new Date().toISOString()})});
  if(r.ok){toast('Marked done!');setTimeout(()=>location.reload(),1000)}else{toast('Update failed','err')}
}
async function snooze(dmId){
  const next=new Date(Date.now()+86400000);
  const r=await fetch(`${SB}/rest/v1/actions_queue?decision_maker_id=eq.${dmId}&status=eq.pending`,{method:'PATCH',headers:{apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'snoozed',due_date:next.toISOString().split('T')[0]})});
  if(r.ok){toast('Snoozed 24h');setTimeout(()=>location.reload(),800)}else{toast('Snooze failed','err')}
}

// Delegated copy-to-clipboard handler (replaces broken inline onclick with apostrophes)
document.addEventListener('click', function(ev) {
  const btn = ev.target.closest('[data-copy-text]');
  if (!btn) return;
  ev.preventDefault();
  const text = decodeURIComponent(btn.dataset.copyText || '');
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('done'); }, 1800);
  }).catch(() => toast && toast('Copy failed', 'err'));
});

</script>
</body>
</html>
