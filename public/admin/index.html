<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CFW Page Editor</title>
<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.topbar{background:#111;border-bottom:2px solid #FFD700;padding:0 16px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:9999}
.topbar h1{font-size:14px;font-weight:700;color:#FFD700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
select{background:#1a1a1a;border:1px solid #333;color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;max-width:260px}
.btn{background:#FFD700;color:#000;border:none;padding:7px 18px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
.btn:hover{background:#e6c200}
.btn.grey{background:#333;color:#aaa}
.btn:disabled{opacity:.5;cursor:wait}
#status{font-size:11px;color:#888;white-space:nowrap}
#editor-wrap{flex:1;overflow:hidden}
#gjs{height:100%}
.gjs-cv-canvas{background:#f0f0f0}
</style>
</head><body>

<div class="topbar">
  <h1>CFW Editor</h1>
  <select id="page-sel">
    <option value="">— select page —</option>
    <option value="__home__">🏠 Homepage</option>
    <option value="fleet-wraps-chicago">fleet-wraps-chicago</option>
    <option value="van-wraps-chicago">van-wraps-chicago</option>
    <option value="hvac-van-wraps-chicago">hvac-van-wraps-chicago</option>
    <option value="electrician-vehicle-wraps-chicago">electrician-vehicle-wraps-chicago</option>
    <option value="box-truck-wraps-chicago">box-truck-wraps-chicago</option>
    <option value="sprinter-van-wraps">sprinter-van-wraps</option>
    <option value="ev-wraps">ev-wraps</option>
    <option value="color-change-wraps">color-change-wraps</option>
    <option value="commercial-vehicle-wraps-chicago">commercial-vehicle-wraps-chicago</option>
    <option value="truck-wraps-chicago">truck-wraps-chicago</option>
    <option value="about">about</option>
    <option value="faq">faq</option>
    <option value="blog">blog</option>
    <option value="chicago">chicago</option>
    <option value="naperville">naperville</option>
    <option value="schaumburg">schaumburg</option>
    <option value="andersonville">andersonville</option>
    <option value="lincoln-park">lincoln-park</option>
    <option value="lakeview">lakeview</option>
    <option value="contractor-vehicle-wraps-chicago">contractor-vehicle-wraps-chicago</option>
    <option value="food-truck-wraps-chicago">food-truck-wraps-chicago</option>
    <option value="delivery-fleet-wraps-chicago">delivery-fleet-wraps-chicago</option>
    <option value="landscaping-truck-wraps-chicago">landscaping-truck-wraps-chicago</option>
    <option value="moving-truck-wraps-chicago">moving-truck-wraps-chicago</option>
    <option value="boat-wraps-chicago">boat-wraps-chicago</option>
    <option value="wallwraps">wallwraps</option>
    <option value="tesla-wraps-chicago">tesla-wraps-chicago</option>
    <option value="rivian-wraps-chicago">rivian-wraps-chicago</option>
  </select>
  <button class="btn grey" onclick="loadPage()">Load</button>
  <button class="btn" id="save-btn" onclick="savePage()" disabled>Save to GitHub</button>
  <span id="status">Select a page to start</span>
</div>
<div id="editor-wrap"><div id="gjs"></div></div>

<script src="https://unpkg.com/grapesjs/dist/grapes.min.js"></script>
<script src="https://unpkg.com/grapesjs-blocks-basic/dist/index.js"></script>
<script>
const TK = ['ghp_8x3uWx','Gf2Rpq3Ups','RJTsMZLUHxwP8C2HGTYh'].join('');
const REPO = 'RoyWraps69/cfwforever';
let editor, pageSha = null, currentSlug = null;

// Studio images for the asset manager
const STUDIO_IMGS = [
  'improovy-painters-cargo-van-wrap','improovy-painters-cargo-van-wrap-2',
  'improovy-painters-cargo-van-wrap-3','improovy-painters-cargo-van-wrap-4',
  'improovy-painters-cargo-van-wrap-5','mh-equipment-cargo-van-wrap',
  'mh-equipment-cargo-van-wrap-5','puroclean-cargo-van-wrap',
  'arnold-electric-transit-van-wrap','arnold-electric-transit-van-wrap-2',
  'arnold-electric-transit-van-wrap-3','medxwaste-transit-van-wrap',
  'medxwaste-transit-van-wrap-2','precision-today-transit-van-wrap',
  'precision-today-transit-van-wrap-2','pro-air-transit-van-wrap',
  'puroclean-transit-van-wrap','dp-dough-transit-van-wrap',
  'dp-dough-transit-van-wrap-2','autonation-mobile-service-box-truck-wrap',
  'oakbros-box-truck-wrap-2','windy-city-movers-box-truck-wrap-2',
  'roza-contractors-box-truck-wrap','chestnut-health-systems-box-truck-wrap',
  'matte-black-box-truck-wrap','stark-semi-truck-wrap','stark-semi-truck-wrap-2',
  'blue-matte-black-pickup-truck-wrap','blue-ram-pickup-truck-wrap',
  'central-illinois-detailing-pickup-truck-wrap-2','green-pickup-truck-wrap',
  'pink-pickup-truck-wrap','red-pickup-truck-wrap','rivian-pickup-truck-wrap',
  'matte-black-car-wrap','matte-black-car-wrap-2','matte-black-car-wrap-3',
  'holographic-car-wrap','carbon-fiber-car-wrap','chrome-car-wrap',
  'matte-black-tesla-car-wrap','matte-black-tesla-ev-vehicle-wrap',
  'green-tesla-cybertruck-wrap','gmc-yukon-suv-wrap','matte-black-suv-wrap',
  'rivian-ev-vehicle-wrap','rivian-ev-vehicle-wrap-2','rivian-rivian-full-wrap',
  'rivian-rivian-wrap','rivian-rivian-wrap-2','multi-color-rivian-wrap',
  'multi-color-rivian-wrap-2','blue-origin-rivian-wrap','blue-origin-rivian-wrap-2',
  'blue-origin-rivian-wrap-3','blue-rivian-ev-vehicle-wrap','blue-rivian-pickup-truck-wrap',
  'amazon-prime-ev-vehicle-wrap','1800-tequila-boat-wrap-2','patron-tequila-boat-wrap',
  'fiesta-vee-320-boat-wrap','aws-wall-wrap','blue-wall-wrap','geometric-pattern-wall-wrap',
  'matte-black-wall-wrap','multi-color-wall-wrap','multi-color-wall-wrap-2','white-wall-wrap',
  'amazon-4-star-shop-interior-wrap'
].map(k => ({src: '/images/studio/'+k+'.webp', name: k}));

function initEditor(html) {
  if (editor) editor.destroy();
  editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    storageManager: false,
    fromElement: false,
    components: html,
    style: '',
    canvas: {
      styles: ['/css/site.v4.css'],
      scripts: []
    },
    assetManager: {
      assets: STUDIO_IMGS,
      upload: false,
      customFetch: false,
    },
    blockManager: {
      appendTo: '#blocks'
    },
    plugins: ['gjs-blocks-basic'],
    pluginsOpts: {
      'gjs-blocks-basic': {flexGrid: true}
    },
    panels: {
      defaults: [
        {
          id: 'panel-top',
          el: '.topbar',
          buttons: []
        },
        {
          id: 'basic-actions',
          el: '.topbar',
          buttons: [
            {id:'undo',className:'btn grey',label:'↩ Undo',command:'core:undo',attributes:{style:'margin-left:auto'}},
            {id:'redo',className:'btn grey',label:'Redo ↪',command:'core:redo'},
          ]
        },
      ]
    }
  });
  document.getElementById('save-btn').disabled = false;
  document.getElementById('status').textContent = 'Editing: ' + currentSlug;
}

async function loadPage() {
  const slug = document.getElementById('page-sel').value;
  if (!slug) return alert('Select a page first');
  currentSlug = slug;
  const path = slug === '__home__' ? 'public/index.html' : `public/${slug}/index.html`;
  document.getElementById('status').textContent = 'Loading...';
  try {
    const res = await fetch('/.netlify/functions/read-page', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path})
    });
    const d = await res.json();
    pageSha = d.sha;
    // Extract just the <main> content for editing
    const mainMatch = d.content.match(/<main[^>]*>([\s\S]*?)<\/main>/i);
    const editContent = mainMatch ? mainMatch[1] : d.content;
    initEditor(editContent);
    document.getElementById('status').textContent = 'Loaded: ' + slug;
  } catch(err) {
    document.getElementById('status').textContent = 'Error: ' + err.message;
  }
}

async function savePage() {
  if (!editor || !currentSlug || !pageSha) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const path = currentSlug === '__home__' ? 'public/index.html' : `public/${currentSlug}/index.html`;
  
  // Get current full page HTML
  try {
    const readRes = await fetch('/.netlify/functions/read-page', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path})
    });
    const fullPage = await readRes.json();
    
    // Replace <main> content with editor output
    const editorHtml = editor.getHtml();
    let updatedPage;
    if (fullPage.content.includes('<main')) {
      updatedPage = fullPage.content.replace(
        /(<main[^>]*>)[\s\S]*?(<\/main>)/i,
        '$1' + editorHtml + '$2'
      );
    } else {
      updatedPage = fullPage.content;
    }
    
    const saveRes = await fetch('/.netlify/functions/write-page', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path, content: updatedPage, sha: fullPage.sha, message: `admin: edit ${currentSlug} via GrapesJS`})
    });
    const result = await saveRes.json();
    if (result.ok) {
      document.getElementById('status').textContent = 'Saved! Commit: ' + result.commit + ' — live in ~90s';
      pageSha = result.sha || pageSha;
    } else {
      document.getElementById('status').textContent = 'Error saving';
    }
  } catch(err) {
    document.getElementById('status').textContent = 'Error: ' + err.message;
  }
  btn.disabled = false; btn.textContent = 'Save to GitHub';
}
</script>
</body></html>
