async function api(fn,body){
  const r=await fetch('/.netlify/functions/'+fn,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

function st(msg,col){
  const el=document.getElementById('st');
  el.textContent=msg;
  el.style.color=col||'#666';
}

async function loadPg(){
  const slug=document.getElementById('pg').value;
  if(!slug)return alert('Pick a page');
  curSlug=slug;
  st('Loading...','#FFD700');
  const path=slug==='__home__'?'public/index.html':`public/${slug}/index.html`;
  const d=await api('read-page',{path});
  curSha=d.sha; fullHtml=d.content;

  // Extract <main> content for editing
  const mm=d.content.match(/<main[^>]*>([\s\S]*?)<\/main>/i);
  const editHtml=mm?mm[1].trim():d.content;

  if(editor){editor.destroy();editor=null;}

  editor=grapesjs.init({
    container:'#gjs',
    height:'100%',
    width:'auto',
    storageManager:false,
    components:editHtml,
    style:'',
    canvas:{
      styles:['/css/site.v4.css'],
    },
    assetManager:{
      assets:ASSETS,
      upload:false,
      embedAsBase64:false,
    },
    plugins:['gjs-blocks-basic'],
    pluginsOpts:{'gjs-blocks-basic':{flexGrid:true}},
    styleManager:{
      sectors:[
        {name:'General',properties:['float','display','position','top','right','left','bottom']},
        {name:'Dimension',open:false,properties:['width','height','max-width','min-height','margin','padding']},
        {name:'Typography',open:false,properties:['font-family','font-size','font-weight','letter-spacing','color','line-height','text-align']},
        {name:'Background',open:false,properties:['background-color','background-image','background-size']},
        {name:'Border',open:false,properties:['border','border-radius']},
      ]
    },
  });

  document.getElementById('sv').disabled=false;
  document.getElementById('un').disabled=false;
  document.getElementById('re').disabled=false;
  st('Editing: '+slug,'#6f6');
}

async function savePg(){
  if(!editor||!curSlug||!curSha)return;
  const btn=document.getElementById('sv');
  btn.disabled=true;btn.textContent='Saving...';
  st('Saving...','#FFD700');

  const edHtml=editor.getHtml();
  const edCss=editor.getCss();

  // Inject edited content back into full page
  let updated=fullHtml;
  if(fullHtml.match(/<main[^>]*>[\s\S]*?<\/main>/i)){
    updated=fullHtml.replace(
      /(<main[^>]*>)[\s\S]*?(<\/main>)/i,
      '$1\n'+edHtml+'\n$2'
    );
  }

  // Inject any new CSS into existing style block or head
  if(edCss&&edCss.trim()){
    const styleBlock='<style id="gjs-css">'+edCss+'</style>';
    if(updated.includes('id="gjs-css"')){
      updated=updated.replace(/<style id="gjs-css">[\s\S]*?<\/style>/,styleBlock);
    }else{
      updated=updated.replace('</head>',styleBlock+'\n</head>');
    }
  }

  const path=curSlug==='__home__'?'public/index.html':`public/${curSlug}/index.html`;
  const res=await api('write-page',{path,content:updated,sha:curSha,message:`admin: edit ${curSlug} via page editor`});
  if(res.ok){
    curSha=res.sha||curSha;
    fullHtml=updated;
    st('Saved! Commit '+res.commit+' — live in ~90s','#6f6');
  }else{
    st('Error: '+JSON.stringify(res),'#f66');
  }
  btn.disabled=false;btn.textContent='Save → GitHub';
}
