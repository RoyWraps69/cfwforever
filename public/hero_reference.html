<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago Fleet Wraps — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFD700;
    --black: #0d0d0d;
    --dark: #1a1a1a;
    --grey: #888;
  }

  body {
    background: var(--black);
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── HERO CONTAINER ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: var(--black);
  }

  /* ── SLIDES ── */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── BACKGROUND IMAGE with Ken Burns ── */
  .slide-bg {
    position: absolute;
    inset: -5%;
    width: 110%;
    height: 110%;
    background-size: cover;
    background-position: center;
    animation: none;
    will-change: transform;
  }
  .slide.active .slide-bg {
    animation: kenburns 6s ease-in-out forwards;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.08) translate(2%, 1%); }
    100% { transform: scale(1.0) translate(0%, 0%); }
  }

  /* ── OVERLAYS ── */
  .overlay-gradient {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 55%, transparent 100%),
      linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
  }

  /* ── YELLOW ACCENT BARS ── */
  .accent-bar {
    position: absolute;
    left: 0;
    width: 6px;
    background: var(--yellow);
    transition: height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .accent-bar.top { top: 0; height: 0; }
  .accent-bar.bot { bottom: 0; height: 0; }
  .slide.active .accent-bar.top { height: 42%; transition-delay: 0.3s; }
  .slide.active .accent-bar.bot { height: 42%; transition-delay: 0.5s; }

  /* ── CONTENT ── */
  .slide-content {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--yellow);
    opacity: 0;
    transform: translateX(-30px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .slide.active .eyebrow {
    opacity: 1;
    transform: translateX(0);
    transition-delay: 0.2s;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 10vw, 120px);
    line-height: 0.95;
    color: #fff;
    white-space: pre-line;
    opacity: 0;
    transform: translateX(-40px);
    transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    margin: 12px 0;
  }
  .slide.active .headline {
    opacity: 1;
    transform: translateX(0);
    transition-delay: 0.4s;
  }
  /* Yellow highlight on last word */
  .headline span {
    color: var(--yellow);
  }

  .subline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.75);
    opacity: 0;
    transform: translateX(-30px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: 4px;
  }
  .slide.active .subline {
    opacity: 1;
    transform: translateX(0);
    transition-delay: 0.6s;
  }

  .cta-btn {
    display: inline-block;
    margin-top: 28px;
    padding: 14px 36px;
    background: var(--yellow);
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-decoration: none;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    border: none;
    position: relative;
    overflow: hidden;
  }
  .cta-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.15);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
  }
  .cta-btn:hover::after { transform: translateX(0); }
  .slide.active .cta-btn {
    opacity: 1;
    transform: translateY(0);
    transition-delay: 0.8s;
  }

  /* ── PROGRESS DOTS ── */
  .dots {
    position: absolute;
    bottom: 36px;
    left: 80px;
    display: flex;
    gap: 10px;
    z-index: 20;
  }
  .dot {
    width: 28px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: background 0.3s, width 0.3s;
    position: relative;
    overflow: hidden;
  }
  .dot.active {
    background: rgba(255,255,255,0.2);
    width: 56px;
  }
  .dot.active::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--yellow);
    animation: dotfill var(--duration, 5s) linear forwards;
  }
  @keyframes dotfill {
    from { width: 0%; }
    to { width: 100%; }
  }

  /* ── SLIDE COUNTER ── */
  .counter {
    position: absolute;
    bottom: 38px;
    right: 48px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    z-index: 20;
  }
  .counter span { color: var(--yellow); }

  /* ── LOGO WATERMARK ── */
  .watermark {
    position: absolute;
    top: 32px;
    right: 48px;
    z-index: 20;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* ── SCANLINE texture ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.03) 3px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 15;
  }

  /* ── NAV ARROWS ── */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--yellow);
    font-size: 28px;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  .nav-btn:hover { background: rgba(255,215,0,0.25); }
  .nav-prev { left: 20px; }
  .nav-next { right: 20px; }

  /* ── YELLOW DIAGONAL STRIPE ── */
  .diag-stripe {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 320px;
    height: 100%;
    background: linear-gradient(135deg, transparent 60%, rgba(255,215,0,0.06) 100%);
    pointer-events: none;
    z-index: 5;
  }

</style>
</head>
<body>
<div class="hero" id="hero">
  <div class="scanlines"></div>
  <div class="diag-stripe"></div>

  <div class="watermark">Chicago Fleet Wraps</div>

  <!-- SLIDES injected by JS -->
  <div id="slides-container"></div>

  <!-- DOTS -->
  <div class="dots" id="dots"></div>

  <!-- COUNTER -->
  <div class="counter" id="counter"><span>01</span> / 06</div>

  <!-- NAV -->
  <button class="nav-btn nav-prev" onclick="prevSlide()">&#8592;</button>
  <button class="nav-btn nav-next" onclick="nextSlide()">&#8594;</button>
</div>

DIFFERENCE.`, sub: `312-597-1286 • ChicagoFleetWraps.com` },
];
const DURATION = 5000;

let current = 0;
let timer = null;
let paused = false;

function pad(n) { return String(n+1).padStart(2,'0'); }

function buildSlides() {
  const container = document.getElementById('slides-container');
  const dotsEl = document.getElementById('dots');

  SLIDES.forEach((s, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="slide-bg" style="background-image:url(${s.img})"></div>
      <div class="overlay-gradient"></div>
      <div class="accent-bar top"></div>
      <div class="accent-bar bot"></div>
      <div class="slide-content">
        <div class="eyebrow">Chicago Fleet Wraps</div>
        <div class="headline">${formatHeadline(s.headline)}</div>
        <div class="subline">${s.sub}</div>
        <button class="cta-btn" onclick="window.open('tel:3125971286')">GET A FREE QUOTE</button>
      </div>
    `;
    container.appendChild(slide);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.style.setProperty('--duration', DURATION + 'ms');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  });
}

function formatHeadline(text) {
  const lines = text.split('\n');
  return lines.map((line, idx) => {
    if (idx === lines.length - 1) {
      const words = line.split(' ');
      const last = words.pop();
      return words.join(' ') + (words.length ? ' ' : '') + `<span>${last}</span>`;
    }
    return line;
  }).join('<br>');
}

function goTo(n) {
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');

  slides[current].classList.remove('active');
  dots[current].classList.remove('active');
  // reset bg animation
  const oldBg = slides[current].querySelector('.slide-bg');
  oldBg.style.animation = 'none';
  void oldBg.offsetWidth;

  current = (n + SLIDES.length) % SLIDES.length;

  slides[current].classList.add('active');
  dots[current].classList.add('active');
  // restart bg animation
  const newBg = slides[current].querySelector('.slide-bg');
  newBg.style.animation = 'none';
  void newBg.offsetWidth;
  newBg.style.animation = '';

  document.getElementById('counter').innerHTML = `<span>${pad(current)}</span> / 06`;

  clearTimeout(timer);
  if (!paused) startTimer();
}

function nextSlide() { goTo(current + 1); }
function prevSlide() { goTo(current - 1); }

function startTimer() {
  timer = setTimeout(() => goTo(current + 1), DURATION);
}

// Pause on hover
document.getElementById('hero').addEventListener('mouseenter', () => { paused = true; clearTimeout(timer); });
document.getElementById('hero').addEventListener('mouseleave', () => { paused = false; startTimer(); });

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft') prevSlide();
});

buildSlides();
startTimer();
</script>
