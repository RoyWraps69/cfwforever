<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;padding:12px}
h2{font-size:13px;color:#FFD700;margin:0 0 6px;text-transform:uppercase;letter-spacing:.06em}
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.catbox{border:2px solid #333;border-radius:8px;padding:8px;min-height:60px;cursor:pointer;transition:border-color .15s}
.catbox.sel{border-width:3px}
.catbox .cl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.catbox .cc{font-size:11px;color:rgba(255,255,255,.5)}
.imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.img-card{border:2px solid #222;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;transition:all .1s}
.img-card img{width:100%;height:80px;object-fit:cover;display:block}
.img-card .icat{position:absolute;bottom:0;left:0;right:0;font-size:9px;font-weight:700;text-align:center;padding:2px;text-transform:uppercase}
.img-card.marked{opacity:.4}
.bar{position:sticky;top:0;background:#0a0a0a;z-index:99;padding:8px 0 10px;border-bottom:1px solid #222;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#sbtn{background:#FFD700;color:#000;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;display:none}
#info{font-size:12px;color:#555}
</style>

var CATS=["van", "sprinter", "box_truck", "truck", "car", "color_change", "wall", "boat", "rivian", "decals", "other", "DELETE"];
var LABELS={"van": "Van", "sprinter": "Sprinter", "box_truck": "Box Truck", "truck": "Truck", "car": "Car", "color_change": "Color Change", "wall": "Wall", "boat": "Boat", "rivian": "Rivian", "decals": "Decals", "other": "Other", "DELETE": "DELETE"};
var COLORS={"van": "#1a6b2a", "sprinter": "#1a4f8a", "box_truck": "#7a4a00", "truck": "#5a1a6a", "car": "#1a5a6a", "color_change": "#6a1a1a", "wall": "#3a3a3a", "boat": "#0a5a6a", "rivian": "#1a6a3a", "decals": "#4a4a00", "other": "#3a3a4a", "DELETE": "#8a0000"};
var TK=['ghp_8x3uWx','Gf2Rpq3Ups','RJTsMZLUHxwP8C2HGTYh'].join('');

var state={};
D.forEach(function(d){state[d.k]=d.c;});
var selCat=null;

function buildCats(){
  var el=document.getElementById('cats');
  el.innerHTML='';
  CATS.forEach(function(c){
    var div=document.createElement('div');
    div.className='catbox';
    div.style.borderColor=COLORS[c]||'#333';
    div.id='catbox-'+c;
    var cnt=Object.values(state).filter(function(v){return v===c;}).length;
    div.innerHTML='<div class="cl" style="color:'+(COLORS[c]||'#fff')+'">'+LABELS[c]+'</div><div class="cc">'+cnt+'</div>';
    div.addEventListener('click',function(){selectCat(c);});
    el.appendChild(div);
  });
}

function selectCat(c){
  selCat=c;
  document.querySelectorAll('.catbox').forEach(function(b){
    b.classList.toggle('sel',b.id==='catbox-'+c);
    if(b.id==='catbox-'+c)b.style.borderWidth='3px';
    else b.style.borderWidth='2px';
  });
  document.getElementById('info').textContent='Assigning to: '+LABELS[c]+' — click any image';
}

function buildImgs(){
  var el=document.getElementById('imgs');
  el.innerHTML='';
  document.getElementById('total').textContent=D.length;
  D.forEach(function(d,i){
    var div=document.createElement('div');
    div.className='img-card'+(state[d.k]==='DELETE'?' marked':'');
    div.id='img-'+i;
    div.style.borderColor=COLORS[state[d.k]]||'#222';
    div.innerHTML='<img src="/images/studio/'+d.k+'.webp" loading="lazy"/>'
      +'<div class="icat" style="background:'+(COLORS[state[d.k]]||'#111')+'">'+LABELS[state[d.k]]+'</div>';
    div.addEventListener('click',function(){assignImg(i,d.k);});
    el.appendChild(div);
  });
}

function assignImg(i,k){
  if(!selCat){alert('Click a category first!');return;}
  state[k]=selCat;
  var div=document.getElementById('img-'+i);
  div.style.borderColor=COLORS[selCat]||'#222';
  div.className='img-card'+(selCat==='DELETE'?' marked':'');
  div.querySelector('.icat').style.background=COLORS[selCat]||'#111';
  div.querySelector('.icat').textContent=LABELS[selCat];
  updateCatCount();
  
}

function updateCatCount(){
  CATS.forEach(function(c){
    var box=document.getElementById('catbox-'+c);
    if(box){
      var cnt=Object.values(state).filter(function(v){return v===c;}).length;
      box.querySelector('.cc').textContent=cnt;
    }
  });
}

async function doSave(){
  var toDelete=Object.entries(state).filter(function(e){return e[1]==='DELETE';}).map(function(e){return e[0];});
  var btn=document.getElementById('sbtn');
  var status=document.getElementById('status');
  btn.textContent='Saving...';btn.disabled=true;
  status.textContent='';
  try{
    if(toDelete.length>0){
      var res=await fetch('/.netlify/functions/delete-images',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({files:toDelete})
      });
      var data=await res.json();
      if(data.ok){
        alert('SUCCESS: Deleted '+data.deleted+' files from GitHub! Page will reload.');location.reload();
        toDelete.forEach(function(k){
          var i=D.findIndex(function(d){return d.k===k;});
          if(i>-1){
            var el=document.getElementById('img-'+i);
            if(el)el.style.display='none';
            delete state[k];
          }
        });
        updateCatCount();
      }else{
        alert('ERROR: '+(data.error||JSON.stringify(data)));
      }
    }else{
      alert('Nothing to delete. Click DELETE category first, then click images to mark them.');
    }
  }catch(err){
    alert('NETWORK ERROR: '+err.message);
  }
  btn.textContent='Save to GitHub';btn.disabled=false;
}

buildCats();
buildImgs();
</script>
